services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
      - app

  api:
    build:
      context: ./api
    volumes:
      - ./api:/var/www/html
    working_dir: /var/www/html
    environment:
      DATABASE_URL: postgres://assetflow:assetflow@db:5432/assetflow
    depends_on:
      - db

  app:
    image: node:20
    working_dir: /app
    volumes:
      - ./app:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: assetflow
      POSTGRES_USER: assetflow
      POSTGRES_PASSWORD: assetflow
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  db_data: